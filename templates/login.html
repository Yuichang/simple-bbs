<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>

<body>

    <h2>ログイン</h2>
    <form action="/login" method="POST">
        <div>
            <input type="text" name="username" placeholder="ユーザー名">
        </div>

        <div>
            <input type="password" name="password" placeholder="パスワード">
        </div>

        <button type="submit">ログイン</button>
    </form>

</body>

</html>
