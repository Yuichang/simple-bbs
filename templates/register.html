<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント登録</title>
    <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css">
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/register.css">
    <script src="/static/script.js" defer></script>


</head>

<body>
    <main class="auth-page">
        <h2 class="auth-title">アカウント登録</h2>

        <form class="auth-form" action="/register" method="POST" onsubmit="return checkInput(this)">
            <div class="input-box">
                <input type="text" name="username" placeholder="ユーザー名">
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="パスワード">
            </div>

            <div class="radio-button">
                <label><input type="radio" name="gender" value="m" checked>男</label>
                <label><input type="radio" name="gender" value="f">女</label>
                <label><input type="radio" name="gender" value="o">その他</label>
            </div>

            <button type="submit">登録</button>
        </form>

        <div class="auth-links">
            <a href="/login">ログインはこちら</a>
        </div>
    </main>

    <footer>
        <p>🐹2026:シンプル掲示板🐹</p>
    </footer>

</body>

</html>
